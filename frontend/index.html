<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Película aleatoria</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif; /* Tipografía más moderna y geométrica */
            background: #09090b;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(236, 72, 153, 0.1) 0%, transparent 40%);
            color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            padding: 24px;
        }

        .tarjeta {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 20px;
            border-radius: 28px;
            text-align: center;
            width: 100%;
            max-width: 360px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.6),
                inset 0 1px 1px rgba(255, 255, 255, 0.05);
            animation: entradaInicial 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes entradaInicial {
            from { opacity: 0; transform: translateY(40px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        #pelicula {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            min-height: 3.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            line-height: 1.3;
        }

        /* Efecto de desvanecimiento para el texto */
        #pelicula.cargando {
            opacity: 0.4;
            transform: translateY(-8px);
        }

        .contenedor-poster {
            position: relative;
            width: 100%;
            margin-top: 12px;
            border-radius: 20px;
            overflow: hidden;
            background: #18181b;
            aspect-ratio: 2 / 3;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.5);
        }

        #poster {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            /* Transición cinematográfica: escala + blur + opacidad */
            transition: 
                opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                filter 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* Estado cuando se va la película anterior */
        #poster.saliente {
            opacity: 0;
            transform: scale(0.92);
            filter: blur(12px);
        }

        /* Estado cuando entra la nueva película */
        #poster.entrante {
            animation: entradaCinematica 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes entradaCinematica {
            0% {
                opacity: 0;
                transform: scale(1.05);
                filter: blur(16px);
            }
            100% {
                opacity: 1;
                transform: scale(1);
                filter: blur(0);
            }
        }

        .skeleton {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0.02) 0%,
                rgba(255, 255, 255, 0.06) 50%,
                rgba(255, 255, 255, 0.02) 100%
            );
            background-size: 200% 100%;
            animation: shimmer 1.8s infinite linear;
            z-index: 2;
            pointer-events: none;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        #nueva {
            margin-top: 24px;
            padding: 16px 24px;
            width: 100%;
            cursor: pointer;
            border-radius: 16px;
            border: none;
            background: #fafafa;
            color: #09090b;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: -0.01em;
            transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Icono sutil en el botón (hecho con CSS puro) */
        #nueva::after {
            content: '✦';
            font-size: 1.1rem;
            transition: transform 0.3s ease;
        }

        #nueva:hover {
            background: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.15);
        }

        #nueva:hover::after {
            transform: rotate(90deg) scale(1.2);
        }

        #nueva:active {
            transform: scale(0.96);
            background: #e4e4e7;
        }
    </style>
</head>

<body>

    <div class="tarjeta">
        <h2 id="pelicula" class="cargando">Cargando...</h2>

        <div class="contenedor-poster">
            <div class="skeleton" id="skeleton"></div>
            <img id="poster" alt="Poster película">
        </div>

        <button id="nueva">Descubrir otra</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
